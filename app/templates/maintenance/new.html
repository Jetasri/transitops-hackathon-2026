{% extends "base.html" %}
{% block content %}
<h2 class="mb-3">New Maintenance Record</h2>

<form method="post" class="row g-3" style="max-width: 560px;">
  <div class="col-12">
    <label class="form-label">Vehicle</label>
    <select name="vehicle_id" class="form-select" required>
      <option value="" disabled selected>Choose a vehicle&hellip;</option>
      {% for v in vehicles %}
        <option value="{{ v.id }}">{{ v.reg_number }} — {{ v.name }} ({{ v.status }})</option>
      {% else %}
        <option value="" disabled>No eligible vehicles available</option>
      {% endfor %}
    </select>
    <div class="form-text">Retired vehicles and vehicles currently On Trip aren't eligible.</div>
  </div>

  <div class="col-12">
    <label class="form-label">Description</label>
    <input type="text" name="description" class="form-control" placeholder="e.g. Oil Change" required>
  </div>

  <div class="col-12">
    <label class="form-label">Cost</label>
    <input type="number" step="any" min="0" name="cost" class="form-control" value="0">
  </div>

  <div class="col-12">
    <button type="submit" class="btn btn-primary">Open Record</button>
    <a href="{{ url_for('maintenance_bp.list_maintenance') }}" class="btn btn-link">Cancel</a>
  </div>
</form>
{% endblock %}
