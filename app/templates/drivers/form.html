{% extends "base.html" %}
{% block content %}
<h2>{{ "Edit Driver" if driver else "New Driver" }}</h2>

{% set fd = form_data if form_data is not none else driver %}

<form method="post">
  <div class="mb-3">
    <label class="form-label">Name</label>
    <input type="text" name="name" class="form-control"
           value="{{ fd.name if fd else '' }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">License Number</label>
    <input type="text" name="license_number" class="form-control"
           value="{{ fd.license_number if fd else '' }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">License Category</label>
    <input type="text" name="license_category" class="form-control"
           value="{{ fd.license_category if fd else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">License Expiry</label>
    <input type="date" name="license_expiry" class="form-control"
           value="{{ fd.license_expiry if fd else '' }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Contact Number</label>
    <input type="text" name="contact_number" class="form-control"
           value="{{ fd.contact_number if fd else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Safety Score</label>
    <input type="number" step="any" name="safety_score" class="form-control"
           value="{{ fd.safety_score if fd else 100 }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Status</label>
    <select name="status" class="form-select">
      {% for s in statuses %}
        <option value="{{ s }}" {% if (fd.status if fd else 'Available') == s %}selected{% endif %}>{{ s }}</option>
      {% endfor %}
    </select>
  </div>

  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{{ url_for('drivers_bp.list_drivers') }}" class="btn btn-link">Cancel</a>
</form>
{% endblock %}
